name: CI/CD Docker Deploy Fullstack

on:
  push:
    branches:
      - deploy  # Chạy khi Thụy push code vào nhánh deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend_api
          push: true
          # Ghi cứng tên image để tránh lỗi "invalid reference"
          tags: gitzno/tdmk-backend:latest

      # Build & Push Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-ui
          push: true
          tags: gitzno/tdmk-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code (to get docker-compose.yml)
        uses: actions/checkout@v4

      # Tự động đẩy file docker-compose.yml từ GitHub sang VPS
      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/thuy/tdmk-app/"
          overwrite: true

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # 1. Đi vào thư mục dự án
            cd /home/thuy/tdmk-app || exit

            # 2. Đăng nhập Docker trên VPS (Dùng Token của Thụy)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # 3. Kéo bản mới nhất về (Ghi cứng tên image trong lệnh pull nếu cần, 
            # nhưng docker compose pull sẽ đọc từ file .yml vừa copy qua)
            docker compose pull

            # 4. Khởi động lại toàn bộ hệ thống
            docker compose up -d
            
            # 5. Dọn dẹp các image cũ để tránh đầy ổ cứng VPS
            docker image prune -f