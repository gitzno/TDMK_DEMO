name: Build and Deploy TD-MK System (Fullstack)

on:
  push:
    branches: [ "deploy" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tdmk-backend:latest 

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tdmk-frontend:latest 

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Đăng nhập lại trên VPS để đảm bảo quyền Pull
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Pull Image mới
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tdmk-backend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tdmk-frontend:latest

            # Restart Backend
            docker stop tdmk-backend-container || true
            docker rm tdmk-backend-container || true
            docker run -d --name tdmk-backend-container -p 8080:8080 --restart always ${{ secrets.DOCKERHUB_USERNAME }}/tdmk-backend:latest

            # Restart Frontend
            docker stop tdmk-frontend-container || true
            docker rm tdmk-frontend-container || true
            docker run -d --name tdmk-frontend-container -p 3000:3000 --restart always ${{ secrets.DOCKERHUB_USERNAME }}/tdmk-frontend:latest

            # Dọn dẹp image cũ
            docker image prune -f