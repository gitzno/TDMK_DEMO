name: Build and Deploy TD-MK System

on:
  push:
    branches: [ "deploy" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Backend từ thư mục backend_api
      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend_api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tdmk-backend:latest 

      # Build Frontend từ thư mục frontend-ui
      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend-ui
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tdmk-frontend:latest 

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Di chuyển vào thư mục project trên VPS
            cd ~/td-mk-project || mkdir -p ~/td-mk-project && cd ~/td-mk-project

            # 2. Đăng nhập Docker Hub để có quyền kéo image
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 3. Pull các bản build mới nhất về
            docker pull ${{ secrets.DOCKHUB_USERNAME }}/tdmk-backend:latest
            docker pull ${{ secrets.DOCKHUB_USERNAME }}/tdmk-frontend:latest

            # 4. Sử dụng Docker Compose để khởi động lại toàn bộ hệ thống
            # Lệnh này sẽ tự động dừng container cũ và chạy bản mới
            docker compose up -d

            # 5. Dọn dẹp image cũ không dùng đến
            docker image prune -f