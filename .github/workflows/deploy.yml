name: Build and Deploy TD-MK System

on:
  push:
    branches: [ "deploy" ] # Chạy khi push vào nhánh deploy
  workflow_dispatch:      # Cho phép chạy thủ công từ tab Actions

jobs:
  build-and-push:
    name: Build Docker Images and Push to Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend_api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tdmk-backend:latest

      # Build & Push Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-ui
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tdmk-frontend:latest

  deploy-to-vps:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TỰ ĐỘNG COPY FILE DOCKER-COMPOSE SANG VPS
      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/thuy/tdmk-app/"
          overwrite: true

      # THỰC THI LỆNH TRÊN VPS
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Di chuyển vào thư mục dự án
            cd /home/thuy/tdmk-app || exit

            # 2. Đăng nhập Docker trên VPS
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 3. Kéo Image mới nhất về
            docker compose pull

            # 4. Khởi động lại các dịch vụ (Backend & Frontend)
            docker compose up -d

            # 5. Dọn dẹp các Image cũ để tránh đầy ổ cứng VPS
            docker image prune -f