name: CI/CD Docker Deploy Fullstack (Domain Mode Fix)

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: '${{ secrets.DOCKERHUB_USERNAME }}'
          password: '${{ secrets.DOCKERHUB_TOKEN }}'

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend_api
          push: true
          tags: gitzno/tdmk-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-ui
          push: true
          tags: gitzno/tdmk-frontend:latest

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: '${{ secrets.VPS_IP }}'
          username: '${{ secrets.VPS_USERNAME }}'
          key: '${{ secrets.VPS_SSH_KEY }}'
          source: "docker-compose.yml"
          target: "/home/thuy/tdmk-app/"
          overwrite: true

      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: '${{ secrets.VPS_IP }}'
          username: '${{ secrets.VPS_USERNAME }}'
          key: '${{ secrets.VPS_SSH_KEY }}'
          # Bơm các Secret từ GitHub sang môi trường shell của VPS
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,MSSQL_SA_PASSWORD,DB_NAME
          script: |
            # 1. Đi vào thư mục chứa docker-compose.yml
            cd /home/thuy/tdmk-app || exit

            # 2. Đăng nhập Docker trên VPS
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # 3. THIẾT LẬP BIẾN MÔI TRƯỜNG CHO PHIÊN LÀM VIỆC NÀY
            # Sửa lại thành Domain thật của Thụy. Nếu đã có Nginx Proxy cổng 80 thì bỏ :7287
            export BACKEND_DOMAIN="apis.tdmk.vn:7287"
            
            # Đồng bộ các biến khác cho Backend và DB
            export MSSQL_SA_PASSWORD='${{ secrets.MSSQL_SA_PASSWORD }}'
            export DB_NAME='${{ secrets.DB_NAME }}'
            export DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}'

            # 4. LÀM SẠCH CONTAINER CŨ (Cực kỳ quan trọng để xóa cache env cũ)
            docker compose down --remove-orphans

            # 5. Kéo bản Image mới nhất từ Docker Hub
            docker compose pull

            # 6. Khởi động hệ thống với các biến export ở trên
            docker compose up -d
            
            # 7. Dọn dẹp Image rác để tiết kiệm dung lượng VPS
            docker image prune -f