name: CI/CD Docker Deploy Fullstack (Secure Mode)

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: '${{ secrets.DOCKERHUB_USERNAME }}'
          password: '${{ secrets.DOCKERHUB_TOKEN }}'

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend_api
          push: true
          tags: gitzno/tdmk-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-ui
          push: true
          tags: gitzno/tdmk-frontend:latest

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: '${{ secrets.VPS_IP }}'
          username: '${{ secrets.VPS_USERNAME }}'
          key: '${{ secrets.VPS_SSH_KEY }}'
          source: "docker-compose.yml"
          target: "/home/thuy/tdmk-app/"
          overwrite: true

      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: '${{ secrets.VPS_IP }}'
          username: '${{ secrets.VPS_USERNAME }}'
          key: '${{ secrets.VPS_SSH_KEY }}'
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,MSSQL_SA_PASSWORD,DB_NAME,VPS_IP
          script: |
            cd /home/thuy/tdmk-app || exit

            # Đăng nhập Docker trên VPS
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Export biến để Docker Compose nhìn thấy
            export MSSQL_SA_PASSWORD='${{ secrets.MSSQL_SA_PASSWORD }}'
            export DB_NAME='${{ secrets.DB_NAME }}'
            export DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}'
            export VPS_IP='${{ secrets.VPS_IP }}'

            # Kéo bản mới và khởi động lại
            docker compose pull
            docker compose up -d
            
            # Dọn dẹp image cũ
            docker image prune -f