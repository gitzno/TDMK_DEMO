name: Build and Deploy TD-MK Backend

on:
  push:
    branches: [ "main" ] # Hoặc branch bạn đang phát triển
  workflow_dispatch: # Cho phép bấm rerun thủ công từ giao diện

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Thay 'gitzno' bằng Docker Username của Thụy
          tags: gitzno/tdmk-backend:latest 

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Chỉ chạy sau khi push thành công
    steps:
      - name: Executing remote ssh commands using password
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }} # Khuyên dùng SSH Key
          # Nếu dùng mật khẩu thì thay 'key' bằng: password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            # 1. Đăng nhập Docker trên VPS (nếu là repo private)
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 2. Pull bản mới nhất vừa build xong
            docker pull gitzno/tdmk-backend:latest

            # 3. Dừng và xóa container cũ nếu đang chạy
            docker stop tdmk-backend-container || true
            docker rm tdmk-backend-container || true

            # 4. Chạy container mới
            # Thụy nhớ điều chỉnh các biến môi trường (-e) và port (-p) cho đúng với .NET app của bạn
            docker run -d \
              --name tdmk-backend-container \
              -p 8080:8080 \
              --restart always \
              gitzno/tdmk-backend:latest

            # 5. Dọn dẹp các image cũ để tránh đầy dung lượng VPS
            docker image prune -f