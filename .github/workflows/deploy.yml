name: Build and Deploy TD-MK System (Fullstack)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # JOB 1: Build và Push cả 2 Image
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend # Đường dẫn đến thư mục chứa Dockerfile backend
          push: true
          tags: gitzno/tdmk-backend:latest 

      # Build Frontend (Nuxt/Vue)
      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend # Đường dẫn đến thư mục chứa Dockerfile frontend
          push: true
          tags: gitzno/tdmk-frontend:latest 

  # JOB 2: Deploy lên VPS
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Đăng nhập Docker Hub trên VPS
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 2. Pull cả 2 bản mới nhất
            docker pull gitzno/tdmk-backend:latest
            docker pull gitzno/tdmk-frontend:latest

            # 3. Xử lý Backend
            docker stop tdmk-backend-container || true
            docker rm tdmk-backend-container || true
            docker run -d \
              --name tdmk-backend-container \
              -p 8080:8080 \
              --restart always \
              gitzno/tdmk-backend:latest

            # 4. Xử lý Frontend
            docker stop tdmk-frontend-container || true
            docker rm tdmk-frontend-container || true
            docker run -d \
              --name tdmk-frontend-container \
              -p 3000:3000 \
              --restart always \
              gitzno/tdmk-frontend:latest

            # 5. Dọn dẹp Image rác để tiết kiệm dung lượng VPS
            docker image prune -f